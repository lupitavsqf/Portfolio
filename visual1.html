<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BiGGi Background</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    overflow-x: hidden;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
  }

  .content {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .scene {
    position: relative;
    display: inline-block;
  }

  /* 🚜 TRACTOR */
  #tractor {
    width: 480px;
    display: block;
  }

  /* 🤖 ROBOT INSIDE TOP-RIGHT */
  #robot {
    position: absolute;

    top: 10px;     /* move down into tractor */
    right: 45px;   /* move left into tractor */

    width: 180px;  /* slightly smaller */

    /* subtle realism */
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.25));
    transform: scale(0.95);

    pointer-events: auto;
  }
</style>
</head>

<body>

<div class="content">
  <div class="scene">

    <!-- TRACTOR -->
    <img src="tractor.png" id="tractor" alt="Tractor" />

    <!-- ROBOT INSIDE -->
    <svg id="robot" viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg">
      <style>
        .ring1 { animation: pulseExpand 2s ease-out infinite; transform-origin: 340px 52px; }
        .ring2 { animation: pulseExpand 2s ease-out infinite; animation-delay: 0.7s; transform-origin: 340px 52px; }

        @keyframes pulseExpand {
          0%   { r: 18px; opacity: 1; }
          100% { r: 72px; opacity: 0; }
        }
      </style>

      <circle class="ring1" cx="340" cy="52" r="18" fill="none" stroke="#e8603a" stroke-width="3"/>
      <circle class="ring2" cx="340" cy="52" r="18" fill="none" stroke="#e8603a" stroke-width="3"/>
      <circle cx="340" cy="52" r="18" fill="none" stroke="#e8603a" stroke-width="3"/>
      <circle cx="340" cy="52" r="8" fill="#e8603a"/>

      <rect x="333" y="74" width="14" height="56" fill="#111"/>

      <rect x="112" y="295" width="48" height="70" rx="6" fill="#5b8fd4" stroke="#111" stroke-width="5"/>
      <rect x="520" y="295" width="48" height="70" rx="6" fill="#5b8fd4" stroke="#111" stroke-width="5"/>

      <rect x="140" y="130" width="400" height="310" rx="48" fill="#f5e96a" stroke="#111" stroke-width="8"/>

      <circle cx="252" cy="295" r="72" fill="white" stroke="#111" stroke-width="7"/>
      <circle id="pupilL" cx="252" cy="295" r="28" fill="#111"/>

      <circle cx="428" cy="295" r="72" fill="white" stroke="#111" stroke-width="7"/>
      <circle id="pupilR" cx="428" cy="295" r="28" fill="#111"/>

      <path d="M280 390 Q340 440 400 390" fill="none" stroke="#111" stroke-width="8" stroke-linecap="round"/>

      <rect x="316" y="440" width="48" height="30" rx="4" fill="#111"/>

      <rect x="296" y="470" width="88" height="28" rx="4" fill="#e8963a" stroke="#111" stroke-width="4"/>
      <rect x="296" y="504" width="88" height="28" rx="4" fill="#f5e96a" stroke="#111" stroke-width="4"/>
      <rect x="296" y="538" width="88" height="28" rx="4" fill="#e8963a" stroke="#111" stroke-width="4"/>
    </svg>

  </div>
</div>

<!-- p5.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

<script>
let angle = 0;

function setup() {
  let c = createCanvas(window.innerWidth, window.innerHeight, WEBGL);
  c.parent(document.body);
}

function windowResized() {
  resizeCanvas(window.innerWidth, window.innerHeight);
}

function draw() {
  let time = millis() * 0.001;

  let r = map(sin(time), -1, 1, 100, 255);
  let g = map(sin(time + TWO_PI / 3), -1, 1, 0, 100);
  let b = map(sin(time + TWO_PI * 2 / 3), -1, 1, 200, 255);

  background(r, g, b);

  let spacing = 80;
  let cols = floor(width / spacing) + 2;
  let rows = floor(height / spacing) + 2;

  let xOffset = -((cols - 1) * spacing) / 2;
  let yOffset = -((rows - 1) * spacing) / 2;

  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      push();

      let d = dist(mouseX - width / 2, mouseY - height / 2,
                   xOffset + i * spacing, yOffset + j * spacing);

      let radius = map(d, 0, 300, 40, 5);

      let cr = map(sin(time + (i + j) * 0.5), -1, 1, 100, 255);
      let cg = map(sin(time + (i + j) * 0.5 + TWO_PI / 3), -1, 1, 0, 100);
      let cb = map(sin(time + (i + j) * 0.5 + TWO_PI * 2 / 3), -1, 1, 200, 255);

      fill(cr, cg, cb);
      noStroke();

      translate(xOffset + i * spacing, yOffset + j * spacing, 0);
      rotateY(angle + (i + j) * 0.1);
      sphere(radius);

      pop();
    }
  }

  angle += 0.01;
}
</script>

<!-- Eye tracking (unchanged) -->
<script>
const svg = document.getElementById("robot");
const pupilL = document.getElementById("pupilL");
const pupilR = document.getElementById("pupilR");

const eyes = [
  { el: pupilL, cx: 252, cy: 295, limit: 32 },
  { el: pupilR, cx: 428, cy: 295, limit: 32 },
];

document.addEventListener("mousemove", (e) => {
  const rect = svg.getBoundingClientRect();
  const scaleX = 680 / rect.width;
  const scaleY = 780 / rect.height;

  const mouseX = (e.clientX - rect.left) * scaleX;
  const mouseY = (e.clientY - rect.top) * scaleY;

  eyes.forEach(({ el, cx, cy, limit }) => {
    const dx = mouseX - cx;
    const dy = mouseY - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const move = Math.min(dist, limit) / dist || 0;

    el.setAttribute("cx", cx + dx * move);
    el.setAttribute("cy", cy + dy * move);
  });
});
</script>

</body>
</html>
